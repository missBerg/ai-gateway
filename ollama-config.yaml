apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: default
spec:
  type: ExternalName
  externalName: host.docker.internal
  ports:
    - port: 11434
---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIServiceBackend
metadata:
  name: ollama-backend
  namespace: default
spec:
  schema:
    name: OpenAI
  backendRef:
    name: ollama-service
    kind: Service
    port: 11434
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ollama-gateway
  namespace: default
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIGatewayRoute
metadata:
  name: ollama-route
  namespace: default
spec:
  schema:
    name: OpenAI
  targetRefs:
    - name: ollama-gateway
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    - backendRefs:
        - name: ollama-backend
          weight: 100
