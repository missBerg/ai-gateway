apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: QuotaPolicy
metadata:
  name: basic-quota
  namespace: default
spec:
  targetRefs:
    - group: aigateway.envoyproxy.io
      kind: AIServiceBackend
      name: dog-backend
  serviceQuota:
    costExpression: "input_tokens + output_tokens"
    quota:
      limit: 1000
      duration: 1h
