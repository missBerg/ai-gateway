apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: QuotaPolicy
metadata:
  name: cost-transparency-quota
  namespace: default
spec:
  targetRefs:
    - group: aigateway.envoyproxy.io
      kind: AIServiceBackend
      name: dog-backend
  serviceQuota:
    pricingRef:
      name: anthropic-prices
    monetaryQuota:
      amount: 1000000
      currency: USD
      unit: MicroDollar
      duration: 1d
  costTransparency:
    enabled: true
