apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: QuotaPolicy
metadata:
  name: most-generous-quota
  namespace: default
spec:
  targetRefs:
    - group: aigateway.envoyproxy.io
      kind: AIServiceBackend
      name: dog-backend
  perModelQuotas:
    - modelName: claude-3-5-sonnet
      quota:
        mode: MostGenerous
        defaultBucket:
          limit: 10000
          duration: 1h
        bucketRules:
          - clientSelectors:
              - headers:
                  - name: x-tier
                    value: gold
            quota:
              limit: 100000
              duration: 1h
          - clientSelectors:
              - headers:
                  - name: x-tier
                    value: platinum
            quota:
              limit: 500000
              duration: 1h
