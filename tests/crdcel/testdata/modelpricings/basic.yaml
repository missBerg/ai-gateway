apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: ModelPricing
metadata:
  name: anthropic-prices
  namespace: default
spec:
  currency: USD
  unit: MicroDollar
  models:
    - name: claude-3-5-sonnet
      default:
        inputTokenCost: "3.0"
        outputTokenCost: "15.0"
        cachedInputTokenCost: "0.3"
