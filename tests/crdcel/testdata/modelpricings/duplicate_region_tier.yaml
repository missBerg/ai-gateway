apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: ModelPricing
metadata:
  name: dup-region-tier
  namespace: default
spec:
  currency: USD
  unit: MicroDollar
  models:
    - name: claude-3-5-sonnet
      default:
        inputTokenCost: "3.0"
        outputTokenCost: "15.0"
      overrides:
        - region: eu-west-1
          tier: premium
          inputTokenCost: "4.0"
        - region: eu-west-1
          tier: premium
          inputTokenCost: "4.5"
